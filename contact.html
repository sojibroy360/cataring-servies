<head>
    <meta charset="utf-8">

        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <nav class="navbar navbar-expand-sm navbar-shadow">
        <div class="container d-flex py-2">
            <div class="nav-logo col-lg-5 col-sm-1">
                <a class="navbar-brand d-flex align-items-center nav-logo" href="index.html">
                    <i class="fa-solid fa-utensils me-2"></i>
                    <h>Delish Catering</h>
                </a>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="col-lg-7 col-sm-1  collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
                <div class="d-flex nav-menu" id="navbarSupportedContent">
                    <ul class="navbar-nav d-flex w-100 me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link px-4 py-1 mx-2" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-4 py-1 mx-2 " href="about.html">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-4 py-1 mx-2 active" href="contact.html">Contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-4 py-1 mx-2" href="faq.html">FAQ</a>
                        </li>
                        <li class="nav-item">
              <a class="nav-link px-4 py-1 mx-2" target="_blank" href="https://www.fiverr.com/">Fiverr</a>
            </li>

                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div class="contact-section mt-5">
        <div class="container">
            <div class="contact-hadding">
                <h2>Get in Touch</h2>
            </div>
            <div class="row">
                <div class="col-lg-7 col-sm-1">
                    <form>
                        <div class="form-group">
                            <label for="exampleFormControlInput1">Name</label>
                            <input type="text" class="form-control" id="exampleFormControlInput1"
                                placeholder="Your Name">
                        </div>
                        <div class="form-group mt-3">
                            <label for="exampleFormControlInput1">Email</label>
                            <input type="email" class="form-control" id="exampleFormControlInput1"
                                placeholder="Your Email">
                        </div>
                        <div class="form-group mt-3">
                            <label for="exampleFormControlSelect1">Event Type</label>
                            <select class="form-control" id="exampleFormControlSelect1">
                                <option value="" disabled selected> Select an event type</option>
                                <option>Wedding</option>
                                <option>Corporate Event</option>
                                <option>Birthday Party</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-group mt-3">
                            <label for="exampleFormControlTextarea1">Example textarea</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                        </div>
                        <div class="form-group mt-3">
                            <button onclick="window.alert('Thank you your sms send')" type="submit"
                                class="btn btn-primary">Submit</button>
                        </div>
                    </form>
                </div>
                <div class="col-lg-5 col-sm-1 p-3">
                    <h3 class="">Contact Information</h3>
                    <h5><i class="fa-solid fa-phone"></i> +1 234 567 890</h5>
                    <h5><i class="fa-solid fa-envelope"></i> info@delishcatering.com</h5>
                    <h5><i class="fa-solid fa-map-pin"></i>Parker More, Rangpur</h5>

                </div>
            </div>
        </div>
        <div class="container text-end mt-5 mb-5">
            <p class="text-muted">
                <i class="fa-regular fa-clock"></i>
                <span id="liveDateTimeAbout"></span>
            </p>
        </div>
    </div>
    <div class="footer-section text-center text-light align-items-center">
        <h4>© 2026 Delish Catering. All rights reserved.</h4>
        <h5><i class="fa-solid fa-map-pin"></i> Parker More, Rangpur</h5>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>

</html>
